      <!-- sphere icon -->
      <symbol id="i-sphere" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/>
        <ellipse cx="12" cy="12" rx="8" ry="4.8" fill="none" stroke="currentColor" stroke-width="2"/>
      </symbol>
      <!-- box icon -->
      <symbol id="i-box" viewBox="0 0 24 24">
        <path d="M3 7l9 5 9-5M3 7l9-5 9 5M3 7v10l9 5 9-5V7" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      </symbol>

  </svg>

  <!-- canvas to draw frames to -->
  <canvas id='gfx'></canvas>


  <!-- sidebar -->
  <aside id="sidebar" aria-label="Scene sidebar">
    <header id="sidebar-header">
      <h1>~edit scene~</h1>
    </header>

    <!-- object explorer panel -->
    <section id="explorer" aria-label="Object explorer">
      <div class="section-title">object explorer</div>
      <ul id="tree" class="tree" role="tree" aria-label="Scene graph"></ul>
    </section>

    <!-- interface for inserting objects -->
    <div id="explorer-tools">
      <div class="tools-title">~add objects~</div>
      <div class="tools-bar">
        <button class="button small" id="add-sphere" type="button">+ Sphere</button>
        <button class="button small" id="add-box" type="button">+ Box</button>
        <button class="button small" id="add-mesh" type="button">+ Mesh</button>
      </div>
    </div>

    <!-- interface for resizing the properties panel -->
    <div id="prop-resizer"></div>

    <!-- properties panel -->
    <section id="properties" aria-label="Object properties">
      <div class="section-title">object properties</div>
      <div id="prop-placeholder">select an object to see properties</div>
    </section>
  </aside>


  <!-- samples and fps counter -->
  <div id='msg' aria-live='polite'></div>
 
  <!-- linking main.js -->
  <script type='module' src='/src/main.js'></script>

  <!-- for console access on iOS safari -->
  <script src='https://cdn.jsdelivr.net/npm/eruda'></script>
  <script>eruda.init();</script>
</body>
</html>
